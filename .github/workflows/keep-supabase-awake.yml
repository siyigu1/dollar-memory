name: Keep Supabase awake

# Supabase free-tier projects are paused after ~7 days without API activity.
# Ping the REST API twice a week (Mon + Thu) so the project stays active.
on:
  schedule:
    - cron: '0 8 * * 1,4'
  workflow_dispatch:

permissions:
  actions: write

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          curl -sf --max-time 30 \
            "https://btoqfslwdyynxjaregir.supabase.co/rest/v1/gifts?select=key,count" \
            -H "apikey: sb_publishable_Yky005Hts4CQaqRs5ttM0Q_uZYqNsu5" \
            -H "Authorization: Bearer sb_publishable_Yky005Hts4CQaqRs5ttM0Q_uZYqNsu5"

      # GitHub disables cron workflows in repos with no commits for 60 days.
      # Re-enabling ourselves on every run resets that timer.
      - name: Keep this workflow enabled
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api -X PUT \
            "repos/${{ github.repository }}/actions/workflows/keep-supabase-awake.yml/enable"
